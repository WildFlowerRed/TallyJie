publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.1
  path: ^1.9.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  geolocator: ^14.0.3
  geocoding: ^5.0.0
  archive: ^4.0.7
  file_selector: ^1.0.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true
